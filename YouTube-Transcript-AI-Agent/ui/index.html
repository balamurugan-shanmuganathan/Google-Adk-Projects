<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Transcript AI Agent | Premium Analysis</title>
    <meta name="description" content="Get intelligent transcripts and AI-powered insights from any YouTube video instantly.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js"></script>
</head>
<body>
    <div class="glow-bg"></div>
    
    <main class="container">
        <header class="hero">
            <div class="logo-container">
                <span class="logo-icon">🎥</span>
                <h1 class="title">YouTube AI <span class="accent">Agent</span></h1>
            </div>
            <p class="subtitle">Transform any video into actionable insights in seconds.</p>
            
            <div class="instructions">
                <div class="step">
                    <span class="step-num">1</span>
                    <p>Paste a YouTube URL</p>
                </div>
                <div class="step-divider"></div>
                <div class="step">
                    <span class="step-num">2</span>
                    <p>AI Fetches Transcript</p>
                </div>
                <div class="step-divider"></div>
                <div class="step">
                    <span class="step-num">3</span>
                    <p>Get Instant Analysis</p>
                </div>
            </div>
        </header>

        <section class="input-section">
            <div class="glass-card input-card">
                <form id="url-form" class="url-input-group">
                    <input 
                        type="url" 
                        id="youtube-url" 
                        placeholder="Paste YouTube URL here..." 
                        required
                        autocomplete="off"
                    >
                    <button type="submit" id="submit-btn">
                        <span class="btn-text">Analyze Video</span>
                        <span class="btn-icon">→</span>
                    </button>
                </form>
            </div>
        </section>

        <section id="result-section" class="result-section hidden">
            <div class="layout-grid">
                <!-- Video Section -->
                <div class="video-container">
                    <div class="glass-card video-card" id="video-wrapper">
                        <div class="skeleton-media"></div>
                    </div>
                </div>

                <!-- Analysis Section -->
                <div class="analysis-container">
                    <div class="glass-card analysis-card">
                        <div class="card-header">
                            <h2>AI Analysis</h2>
                            <div class="status-indicator" id="status">
                                <span class="dot"></span>
                                <span class="status-text">Ready</span>
                            </div>
                        </div>
                        <div class="analysis-content" id="analysis-output">
                            <div class="skeleton-text"></div>
                            <div class="skeleton-text" style="width: 80%"></div>
                            <div class="skeleton-text" style="width: 90%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
